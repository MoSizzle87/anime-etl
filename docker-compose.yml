services:
  postgres:
    image: postgres:17-alpine
    container_name: anime-etl-db
    environment:
      POSTGRES_USER: anime_user
      POSTGRES_PASSWORD: anime_password
      POSTGRES_DB: anime_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anime_user -d anime_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anime-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: anime-etl:latest
    container_name: anime-etl-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    volumes:
      - ./logs:/app/logs # Persist logs on host
    networks:
      - anime-network
    restart: on-failure

volumes:
  postgres_data:

networks:
  anime-network:
    driver: bridge
